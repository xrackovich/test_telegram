<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Колесо Фортуны | SO2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #0a1f0a 0%, #0d2b0d 50%, #061406 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        /* Верхняя панель */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid rgba(34, 139, 34, 0.3);
        }

        /* Баланс голды */
        .balance-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(34, 139, 34, 0.4);
            border-radius: 8px;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .balance-icon {
            font-size: 1.1rem;
        }

        .balance-amount {
            color: #ffd700;
            font-weight: bold;
            font-size: 1rem;
        }

        .balance-letter {
            color: #ffd700;
            font-weight: bold;
            font-size: 0.85rem;
            margin-left: 1px;
        }

        /* Профиль */
        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 12px 5px 5px;
            border-radius: 8px;
            border: 1px solid rgba(34, 139, 34, 0.4);
            cursor: pointer;
            transition: background 0.2s;
        }

        .user-profile:active {
            background: rgba(34, 139, 34, 0.2);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid #228b22;
            object-fit: cover;
            background: linear-gradient(135deg, #228b22, #0d4d0d);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: white;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 5px;
            object-fit: cover;
        }

        .user-name {
            color: #e0e0e0;
            font-size: 0.85rem;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .arrow-down {
            color: #228b22;
            font-size: 0.7rem;
            margin-left: 2px;
        }

        /* Меню */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .menu-overlay.active {
            display: flex;
        }

        .menu-panel {
            background: linear-gradient(180deg, #0d2b0d 0%, #0a1f0a 100%);
            border: 1px solid rgba(34, 139, 34, 0.5);
            border-radius: 10px;
            padding: 25px 20px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        .menu-title {
            color: #ffd700;
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .promo-input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(34, 139, 34, 0.4);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            margin-bottom: 12px;
            text-align: center;
        }

        .promo-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .promo-input:focus {
            border-color: #228b22;
        }

        .promo-btn {
            background: linear-gradient(135deg, #228b22, #0d4d0d);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 8px;
            transition: opacity 0.2s;
        }

        .promo-btn:active {
            opacity: 0.8;
        }

        .promo-msg {
            color: #aaa;
            font-size: 0.8rem;
            min-height: 20px;
            margin-top: 5px;
        }

        .promo-msg.success {
            color: #4caf50;
        }

        .promo-msg.error {
            color: #f44336;
        }

        .close-menu-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #aaa;
            padding: 10px 30px;
            font-size: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }

        /* Основной контейнер игры */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 400px;
            width: 100%;
            margin-top: 55px;
        }

        h1 {
            color: #ffd700;
            font-size: 1.8rem;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            text-align: center;
            letter-spacing: 1px;
        }

        .wheel-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
        }

        canvas {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 30px rgba(34, 139, 34, 0.3));
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 45px solid #ff3333;
            filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.8));
        }

        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #ffd700, #b8860b);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
            z-index: 5;
        }

        .spin-btn {
            background: linear-gradient(135deg, #228b22, #0d4d0d);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(34, 139, 34, 0.3);
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            width: 100%;
            max-width: 250px;
            border: 1px solid rgba(34, 139, 34, 0.5);
        }

        .spin-btn:active {
            transform: scale(0.95);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(34, 139, 34, 0.3);
            width: 100%;
            max-width: 300px;
        }

        .result span {
            color: #ffd700;
            font-weight: bold;
        }

        @media (max-width: 380px) {
            .wheel-wrapper {
                width: 260px;
                height: 260px;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Верхняя панель -->
    <div class="top-bar" id="topBar">
        <div class="balance-box">
            <span class="balance-icon">🪙</span>
            <span class="balance-amount" id="balanceAmount">25</span>
            <span class="balance-letter">G</span>
        </div>
        <div class="user-profile" id="userProfile">
            <div class="user-avatar" id="userAvatar">👤</div>
            <span class="user-name" id="userName">Игрок</span>
            <span class="arrow-down">▼</span>
        </div>
    </div>

    <!-- Меню -->
    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-panel">
            <div class="menu-title">🎁 Промокод</div>
            <input type="text" class="promo-input" id="promoInput" placeholder="Введите промокод" autocomplete="off">
            <button class="promo-btn" id="promoBtn">Активировать</button>
            <div class="promo-msg" id="promoMsg"></div>
            <button class="close-menu-btn" id="closeMenuBtn">Закрыть</button>
        </div>
    </div>

    <!-- Основная игра -->
    <div class="game-container" id="gameContainer">
        <h1>🎰 Колесо Фортуны</h1>
        
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <div class="center-circle"></div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>

        <button class="spin-btn" id="spinButton">Крутить</button>
        
        <div class="result" id="resultDisplay">
            Нажми <span>"Крутить"</span>
        </div>
    </div>

    <!-- Звук -->
    <audio id="tickSound" preload="auto">
        <source src="https://xrackovich.github.io/test_telegram/гортание.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ============ Telegram Mini App ============
        const tg = window.Telegram?.WebApp;
        let currentUser = null;

        // ============ Баланс и промокоды ============
        let balance = 25; // стартовый баланс
        const promoUsedKey = 'so2_promos_used';

        // Загрузка использованных промокодов из localStorage
        function getUsedPromos() {
            try {
                return JSON.parse(localStorage.getItem(promoUsedKey) || '{}');
            } catch(e) {
                return {};
            }
        }

        function saveUsedPromos(promos) {
            localStorage.setItem(promoUsedKey, JSON.stringify(promos));
        }

        // Проверка и активация промокода
        function activatePromo(code) {
            const usedPromos = getUsedPromos();
            const upperCode = code.toUpperCase().trim();

            // Загружаем список промокодов
            fetch('https://xrackovich.github.io/test_telegram/промокод.txt')
                .then(res => res.text())
                .then(data => {
                    const lines = data.trim().split('\n');
                    let found = false;

                    for (let line of lines) {
                        const parts = line.trim().split(';');
                        if (parts.length >= 3) {
                            const promoCode = parts[0].trim().toUpperCase();
                            const gold = parseInt(parts[1]);
                            const maxUses = parseInt(parts[2]);

                            if (promoCode === upperCode) {
                                found = true;
                                const usedCount = usedPromos[upperCode] || 0;

                                if (usedCount >= maxUses) {
                                    showPromoMsg('Промокод уже использован максимальное количество раз', 'error');
                                } else {
                                    // Активируем
                                    balance += gold;
                                    updateBalanceDisplay();
                                    usedPromos[upperCode] = usedCount + 1;
                                    saveUsedPromos(usedPromos);
                                    showPromoMsg(`Промокод активирован! +${gold} G`, 'success');
                                }
                                break;
                            }
                        }
                    }

                    if (!found) {
                        showPromoMsg('Промокод не найден', 'error');
                    }
                })
                .catch(() => {
                    showPromoMsg('Ошибка загрузки промокодов', 'error');
                });
        }

        function showPromoMsg(msg, type) {
            const el = document.getElementById('promoMsg');
            el.textContent = msg;
            el.className = 'promo-msg ' + type;
        }

        function updateBalanceDisplay() {
            document.getElementById('balanceAmount').textContent = balance;
        }

        // ============ Инициализация ============
        function init() {
            if (!tg) {
                document.body.innerHTML = `
                    <div style="color: white; text-align: center; padding: 40px;">
                        <h2 style="color: #ffd700;">Откройте приложение через Telegram</h2>
                        <p style="margin-top: 20px;">Перейдите в бота @SO2ruletka_bot и нажмите "Запустить"</p>
                    </div>
                `;
                return;
            }

            tg.ready();
            tg.expand();

            const user = tg.initDataUnsafe?.user;
            if (user) {
                currentUser = user;
                document.getElementById('userName').textContent = user.first_name;
                const avatarEl = document.getElementById('userAvatar');
                if (user.photo_url) {
                    avatarEl.innerHTML = `<img src="${user.photo_url}" alt="Avatar">`;
                } else {
                    avatarEl.textContent = user.first_name.charAt(0).toUpperCase();
                }
            }

            updateBalanceDisplay();
            initGame();
            initMenu();
        }

        // ============ Меню ============
        function initMenu() {
            const overlay = document.getElementById('menuOverlay');
            const profileBtn = document.getElementById('userProfile');
            const closeBtn = document.getElementById('closeMenuBtn');
            const promoBtn = document.getElementById('promoBtn');
            const promoInput = document.getElementById('promoInput');

            profileBtn.addEventListener('click', () => {
                overlay.classList.add('active');
                document.getElementById('promoMsg').textContent = '';
                document.getElementById('promoMsg').className = 'promo-msg';
                promoInput.value = '';
            });

            closeBtn.addEventListener('click', () => {
                overlay.classList.remove('active');
            });

            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                }
            });

            promoBtn.addEventListener('click', () => {
                const code = promoInput.value.trim();
                if (!code) {
                    showPromoMsg('Введите промокод', 'error');
                    return;
                }
                activatePromo(code);
            });

            promoInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    promoBtn.click();
                }
            });
        }

        // ============ Игра Колесо Фортуны ============
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        let spinButton;
        let resultDisplay;
        let gameInitialized = false;

        const sectors = [
            { label: 'НИЧЕГО', color: '#c0392b', reward: 'Ничего 😔', gold: 0 },
            { label: 'ЕЩЁ РАЗ', color: '#2471a3', reward: 'Ещё раз прокрутка 🔄', gold: 0 },
            { label: '10 ГОЛДЫ', color: '#1e7e34', reward: '10 голды 💰', gold: 10 },
            { label: 'НИЧЕГО', color: '#5d6d7e', reward: 'Ничего 😔', gold: 0 },
            { label: '3 КЕЙСА', color: '#7d3c98', reward: '3 рандом кейса (Rare) 📦', gold: 0 },
            { label: '25 ГОЛДЫ', color: '#b8860b', reward: '25 голды 💰', gold: 25 }
        ];

        const sectorAngle = (2 * Math.PI) / sectors.length;
        let currentAngle = 0;
        let spinning = false;
        let autoRetryTimeout = null;
        let lastSectorIndex = -1;

        // Звук
        const tickSound = document.getElementById('tickSound');
        tickSound.volume = 0.4;
        tickSound.preload = 'auto';

        function drawWheel(angle) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 180;

            sectors.forEach((sector, index) => {
                const startAngle = angle + index * sectorAngle;
                const endAngle = startAngle + sectorAngle;

                const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
                gradient.addColorStop(0, sector.color);
                gradient.addColorStop(1, darkenColor(sector.color, 30));

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + sectorAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = 'white';
                ctx.font = 'bold 15px "Segoe UI", Tahoma, sans-serif';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                ctx.shadowBlur = 4;
                ctx.fillText(sector.label, radius - 25, 5);
                ctx.shadowBlur = 0;
                ctx.restore();
            });

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = '#228b22';
            ctx.lineWidth = 3;
            ctx.shadowColor = 'rgba(34, 139, 34, 0.5)';
            ctx.shadowBlur = 15;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function darkenColor(hex, percent) {
            const num = parseInt(hex.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.max((num >> 16) - amt, 0);
            const G = Math.max((num >> 8 & 0x00FF) - amt, 0);
            const B = Math.max((num & 0x0000FF) - amt, 0);
            return `rgb(${R}, ${G}, ${B})`;
        }

        function getCurrentSector(angle) {
            const pointerAngle = (3 * Math.PI / 2 - angle) % (2 * Math.PI);
            const normalizedAngle = pointerAngle < 0 ? pointerAngle + 2 * Math.PI : pointerAngle;
            return Math.floor(normalizedAngle / sectorAngle) % sectors.length;
        }

        function playTickSound() {
            const sound = tickSound.cloneNode();
            sound.volume = 0.4;
            sound.play().catch(() => {});
        }

        function startSpin() {
            if (spinning || !gameInitialized) return;
            
            if (autoRetryTimeout) {
                clearTimeout(autoRetryTimeout);
                autoRetryTimeout = null;
            }

            spinning = true;
            spinButton.disabled = true;
            resultDisplay.innerHTML = 'Крутится... 🎰';
            lastSectorIndex = -1;
            
            const rotations = 5 + Math.floor(Math.random() * 4);
            const totalRotation = rotations * 2 * Math.PI + (Math.random() * 2 * Math.PI);
            
            const startAngle = currentAngle;
            const duration = 3000;
            const startTime = performance.now();
            
            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                const easeOut = 1 - Math.pow(1 - progress, 3);
                
                currentAngle = startAngle + totalRotation * easeOut;
                drawWheel(currentAngle);

                // Проверка пересечения границы сектора для звука
                const currentSector = getCurrentSector(currentAngle);
                if (currentSector !== lastSectorIndex && lastSectorIndex !== -1) {
                    playTickSound();
                }
                lastSectorIndex = currentSector;
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    currentAngle = currentAngle % (2 * Math.PI);
                    drawWheel(currentAngle);
                    
                    const sectorIndex = getCurrentSector(currentAngle);
                    const result = sectors[sectorIndex].reward;
                    const goldEarned = sectors[sectorIndex].gold;
                    
                    resultDisplay.innerHTML = `Результат: <span>${result}</span>`;
                    
                    // Начисление голды
                    if (goldEarned > 0) {
                        balance += goldEarned;
                        updateBalanceDisplay();
                    }
                    
                    spinning = false;
                    spinButton.disabled = false;
                    
                    if (result.includes('Ещё раз прокрутка')) {
                        autoRetryTimeout = setTimeout(() => {
                            if (!spinning) startSpin();
                        }, 1500);
                    }
                }
            }
            
            requestAnimationFrame(animate);
        }

        function initGame() {
            if (gameInitialized) return;
            
            spinButton = document.getElementById('spinButton');
            resultDisplay = document.getElementById('resultDisplay');
            
            spinButton.addEventListener('click', startSpin);
            
            let touchStartY = 0;
            canvas.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
            });

            canvas.addEventListener('touchend', (e) => {
                const touchEndY = e.changedTouches[0].clientY;
                const swipeDistance = touchStartY - touchEndY;
                
                if (swipeDistance > 50 && !spinning) {
                    startSpin();
                }
            });
            
            drawWheel(currentAngle);
            resultDisplay.innerHTML = 'Нажми <span>"Крутить"</span> для старта';
            
            gameInitialized = true;
        }

        // Запуск
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
