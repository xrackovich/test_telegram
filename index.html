<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SO2 Рулетка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #061406;
            --green-neon: #1aff1a;
            --green-mid: #0d2b0d;
            --gold: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            position: relative;
        }

        /* Анимированный фон с шарами */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: floatOrb linear infinite;
            opacity: 0.4;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(100px, -80px) scale(1.3);
            }
            50% {
                transform: translate(-50px, 100px) scale(0.8);
            }
            75% {
                transform: translate(-120px, -40px) scale(1.2);
            }
            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        /* Верхняя панель */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid rgba(26, 255, 26, 0.2);
        }

        .balance-box {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(26, 255, 26, 0.3);
            border-radius: 8px;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .balance-icon {
            font-size: 1.1rem;
        }

        .balance-amount {
            color: var(--gold);
            font-weight: bold;
            font-size: 1rem;
        }

        .balance-letter {
            color: var(--gold);
            font-weight: bold;
            font-size: 0.85rem;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 12px 5px 5px;
            border-radius: 8px;
            border: 1px solid rgba(26, 255, 26, 0.3);
            cursor: pointer;
            transition: background 0.2s;
        }

        .user-profile:active {
            background: rgba(26, 255, 26, 0.15);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid var(--green-neon);
            object-fit: cover;
            background: linear-gradient(135deg, #1a4d1a, #0a2a0a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: white;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 5px;
            object-fit: cover;
        }

        .user-name {
            color: #e0e0e0;
            font-size: 0.85rem;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .arrow-down {
            color: var(--green-neon);
            font-size: 0.7rem;
            margin-left: 2px;
        }

        /* Меню */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .menu-overlay.active {
            display: flex;
        }

        .menu-panel {
            background: linear-gradient(180deg, #0d2b0d 0%, #0a1f0a 100%);
            border: 1px solid rgba(26, 255, 26, 0.4);
            border-radius: 10px;
            padding: 25px 20px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        .menu-title {
            color: var(--gold);
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .promo-input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(26, 255, 26, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            margin-bottom: 12px;
            text-align: center;
        }

        .promo-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .promo-input:focus {
            border-color: var(--green-neon);
        }

        .promo-btn {
            background: linear-gradient(135deg, #1a6b1a, #0d3d0d);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 8px;
            transition: opacity 0.2s;
        }

        .promo-btn:active {
            opacity: 0.8;
        }

        .promo-msg {
            color: #aaa;
            font-size: 0.8rem;
            min-height: 20px;
            margin-top: 5px;
        }

        .promo-msg.success {
            color: #4caf50;
        }

        .promo-msg.error {
            color: #f44336;
        }

        .close-menu-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #aaa;
            padding: 10px 30px;
            font-size: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }

        /* Основной контейнер */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 400px;
            width: 100%;
            margin-top: 55px;
            position: relative;
            z-index: 1;
        }

        .wheel-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
        }

        canvas {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 30px rgba(26, 255, 26, 0.25));
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 45px solid #ff3333;
            filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.8));
        }

        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 55px;
            height: 55px;
            background: radial-gradient(circle, #ffd700, #b8860b);
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a2e;
            font-weight: bold;
            font-size: 0.9rem;
            text-align: center;
            line-height: 1.2;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .center-circle.win {
            background: radial-gradient(circle, #2ecc71, #1a7a3a);
            box-shadow: 0 0 35px rgba(46, 204, 113, 0.9);
            color: white;
        }

        .spin-btn {
            background: linear-gradient(135deg, #1a6b1a, #0d3d0d);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(26, 255, 26, 0.2);
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid rgba(26, 255, 26, 0.4);
            white-space: nowrap;
            position: relative;
            z-index: 1;
        }

        .spin-btn:active {
            transform: scale(0.95);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }

        /* Ползунок громкости */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(26, 255, 26, 0.2);
            z-index: 1;
        }

        .volume-icon {
            font-size: 1.2rem;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 80px;
            height: 4px;
            background: rgba(26, 255, 26, 0.3);
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--green-neon);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(26, 255, 26, 0.6);
        }

        @media (max-width: 380px) {
            .wheel-wrapper {
                width: 260px;
                height: 260px;
            }
            .center-circle {
                width: 45px;
                height: 45px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <!-- Анимированный фон -->
    <div class="bg-animation" id="bgAnimation"></div>

    <!-- Верхняя панель -->
    <div class="top-bar" id="topBar">
        <div class="balance-box">
            <span class="balance-icon">🪙</span>
            <span class="balance-amount" id="balanceAmount">25</span>
            <span class="balance-letter">G</span>
        </div>
        <div class="user-profile" id="userProfile">
            <div class="user-avatar" id="userAvatar">👤</div>
            <span class="user-name" id="userName">Игрок</span>
            <span class="arrow-down">▼</span>
        </div>
    </div>

    <!-- Меню -->
    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-panel">
            <div class="menu-title">🎁 Промокод</div>
            <input type="text" class="promo-input" id="promoInput" placeholder="Введите промокод" autocomplete="off">
            <button class="promo-btn" id="promoBtn">Активировать</button>
            <div class="promo-msg" id="promoMsg"></div>
            <button class="close-menu-btn" id="closeMenuBtn">Закрыть</button>
        </div>
    </div>

    <!-- Основная игра -->
    <div class="game-container" id="gameContainer">
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <div class="center-circle" id="centerCircle">Крутить</div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>

        <button class="spin-btn" id="spinButton">Крутить (15 G)</button>
        
        <!-- Контроль громкости -->
        <div class="volume-control">
            <span class="volume-icon">🔊</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50">
        </div>
    </div>

    <audio id="tickSound" preload="auto" src="https://xrackovich.github.io/test_telegram/гортание.mp3"></audio>

    <script>
        const APP_VERSION = '2.3.0';
        const SPIN_COST = 15;
        console.log('SO2 Ruletka v' + APP_VERSION);

        // ============ Telegram Mini App ============
        const tg = window.Telegram?.WebApp;
        let currentUser = null;
        let userId = 'guest';

        // ============ Анимированный фон ============
        function createOrbs() {
            const container = document.getElementById('bgAnimation');
            const colors = [
                'rgba(26, 255, 26, 0.3)',
                'rgba(0, 180, 0, 0.25)',
                'rgba(20, 200, 20, 0.2)',
                'rgba(10, 150, 10, 0.3)',
                'rgba(30, 220, 30, 0.2)'
            ];
            
            for (let i = 0; i < 5; i++) {
                const orb = document.createElement('div');
                orb.classList.add('orb');
                orb.style.width = (150 + Math.random() * 200) + 'px';
                orb.style.height = orb.style.width;
                orb.style.background = colors[i];
                orb.style.left = (Math.random() * 80) + '%';
                orb.style.top = (Math.random() * 80) + '%';
                orb.style.animationDuration = (15 + Math.random() * 25) + 's';
                orb.style.animationDelay = (-Math.random() * 20) + 's';
                container.appendChild(orb);
            }
        }

        // ============ Баланс, промокоды ============
        let balance = 25;
        const promoUsedKey = 'so2_promos_used_v3';
        const spinCountKey = 'so2_spin_count_v3';

        function getStoragePrefix() {
            return userId + '_';
        }

        function loadBalance() {
            const saved = localStorage.getItem(getStoragePrefix() + 'balance');
            if (saved !== null) {
                balance = parseInt(saved);
                if (isNaN(balance) || balance < 0) balance = 0;
            }
        }

        function saveBalance() {
            localStorage.setItem(getStoragePrefix() + 'balance', balance.toString());
        }

        function getSpinCount() {
            try {
                return parseInt(localStorage.getItem(getStoragePrefix() + spinCountKey) || '0');
            } catch(e) {
                return 0;
            }
        }

        function incrementSpinCount() {
            const key = getStoragePrefix() + spinCountKey;
            const count = getSpinCount() + 1;
            localStorage.setItem(key, count.toString());
            return count;
        }

        function getUsedPromos() {
            try {
                return JSON.parse(localStorage.getItem(getStoragePrefix() + promoUsedKey) || '{}');
            } catch(e) {
                return {};
            }
        }

        function saveUsedPromos(promos) {
            localStorage.setItem(getStoragePrefix() + promoUsedKey, JSON.stringify(promos));
        }

        function activatePromo(code) {
            const usedPromos = getUsedPromos();
            const upperCode = code.toUpperCase().trim();

            fetch('https://xrackovich.github.io/test_telegram/промокод.txt')
                .then(res => res.text())
                .then(data => {
                    const lines = data.trim().split('\n');
                    let found = false;

                    for (let line of lines) {
                        const parts = line.trim().split(';');
                        if (parts.length >= 3) {
                            const promoCode = parts[0].trim().toUpperCase();
                            const gold = parseInt(parts[1]);
                            const maxUses = parseInt(parts[2]);

                            if (promoCode === upperCode) {
                                found = true;
                                const usedCount = usedPromos[upperCode] || 0;

                                if (usedCount >= maxUses) {
                                    showPromoMsg('Промокод уже использован', 'error');
                                } else {
                                    balance += gold;
                                    updateBalanceDisplay();
                                    saveBalance();
                                    usedPromos[upperCode] = usedCount + 1;
                                    saveUsedPromos(usedPromos);
                                    showPromoMsg(`+${gold} G`, 'success');
                                }
                                break;
                            }
                        }
                    }

                    if (!found) {
                        showPromoMsg('Промокод не найден', 'error');
                    }
                })
                .catch(() => {
                    showPromoMsg('Ошибка загрузки', 'error');
                });
        }

        function showPromoMsg(msg, type) {
            const el = document.getElementById('promoMsg');
            el.textContent = msg;
            el.className = 'promo-msg ' + type;
        }

        function updateBalanceDisplay() {
            document.getElementById('balanceAmount').textContent = balance;
        }

        // ============ Инициализация ============
        function init() {
            if (!tg) {
                document.body.innerHTML = `
                    <div style="color: white; text-align: center; padding: 40px; position:relative;z-index:1;">
                        <h2 style="color: #ffd700;">Откройте приложение через Telegram</h2>
                        <p style="margin-top: 20px;">Перейдите в бота @SO2ruletka_bot</p>
                    </div>
                `;
                return;
            }

            tg.ready();
            tg.expand();

            const user = tg.initDataUnsafe?.user;
            if (user) {
                currentUser = user;
                userId = 'tg_' + user.id;
                document.getElementById('userName').textContent = user.first_name;
                const avatarEl = document.getElementById('userAvatar');
                if (user.photo_url) {
                    avatarEl.innerHTML = `<img src="${user.photo_url}" alt="Avatar">`;
                } else {
                    avatarEl.textContent = user.first_name.charAt(0).toUpperCase();
                }
            }

            // Загружаем сохранённый баланс
            loadBalance();
            updateBalanceDisplay();

            createOrbs();
            
            document.addEventListener('click', unlockAudio, { once: true });
            document.addEventListener('touchstart', unlockAudio, { once: true });
            
            initGame();
            initMenu();
            initVolume();
        }

        function unlockAudio() {
            const tickSound = document.getElementById('tickSound');
            tickSound.play().then(() => {
                tickSound.pause();
                tickSound.currentTime = 0;
            }).catch(() => {});
        }

        function initVolume() {
            const slider = document.getElementById('volumeSlider');
            const tickSound = document.getElementById('tickSound');
            tickSound.volume = slider.value / 100;
            
            slider.addEventListener('input', () => {
                tickSound.volume = slider.value / 100;
            });
        }

        // ============ Меню ============
        function initMenu() {
            const overlay = document.getElementById('menuOverlay');
            const profileBtn = document.getElementById('userProfile');
            const closeBtn = document.getElementById('closeMenuBtn');
            const promoBtn = document.getElementById('promoBtn');
            const promoInput = document.getElementById('promoInput');

            profileBtn.addEventListener('click', () => {
                overlay.classList.add('active');
                document.getElementById('promoMsg').textContent = '';
                document.getElementById('promoMsg').className = 'promo-msg';
                promoInput.value = '';
            });

            closeBtn.addEventListener('click', () => {
                overlay.classList.remove('active');
            });

            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                }
            });

            promoBtn.addEventListener('click', () => {
                const code = promoInput.value.trim();
                if (!code) {
                    showPromoMsg('Введите промокод', 'error');
                    return;
                }
                activatePromo(code);
            });

            promoInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    promoBtn.click();
                }
            });
        }

        // ============ Игра ============
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        let spinButton;
        const centerCircle = document.getElementById('centerCircle');
        let gameInitialized = false;

        const sectors = [
            { label: '5 G', color: '#27ae60', reward: '+5 G', gold: 5, weight: 45 },
            { label: '7 G', color: '#2ecc71', reward: '+7 G', gold: 7, weight: 30 },
            { label: '10 G', color: '#1abc9c', reward: '+10 G', gold: 10, weight: 18 },
            { label: '15 G', color: '#f39c12', reward: '+15 G', gold: 15, weight: 12 },
            { label: '25 G', color: '#e67e22', reward: '+25 G', gold: 25, weight: 4 },
            { label: '40 G', color: '#e74c3c', reward: '+40 G', gold: 40, weight: 1 }
        ];

        const beginnerWeights = [25, 30, 25, 20, 8, 2];
        const sectorAngle = (2 * Math.PI) / sectors.length;
        let currentAngle = 0;
        let spinning = false;
        let autoRetryTimeout = null;
        let lastSectorIndex = -1;

        const tickSound = document.getElementById('tickSound');
        tickSound.volume = 0.5;

        function getWeightedRandomSector() {
            const spinCount = getSpinCount();
            let weights = spinCount < 3 ? beginnerWeights : sectors.map(s => s.weight);
            
            const totalWeight = weights.reduce((sum, w) => sum + w, 0);
            let random = Math.random() * totalWeight;
            
            for (let i = 0; i < sectors.length; i++) {
                random -= weights[i];
                if (random <= 0) return i;
            }
            return 0;
        }

        function drawWheel(angle) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 180;

            sectors.forEach((sector, index) => {
                const startAngle = angle + index * sectorAngle;
                const endAngle = startAngle + sectorAngle;

                const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
                gradient.addColorStop(0, sector.color);
                gradient.addColorStop(1, darkenColor(sector.color, 30));

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + sectorAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px "Segoe UI", Tahoma, sans-serif';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                ctx.shadowBlur = 4;
                ctx.fillText(sector.label, radius - 25, 5);
                ctx.shadowBlur = 0;
                ctx.restore();
            });

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = '#1aff1a';
            ctx.lineWidth = 3;
            ctx.shadowColor = 'rgba(26, 255, 26, 0.4)';
            ctx.shadowBlur = 15;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function darkenColor(hex, percent) {
            const num = parseInt(hex.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.max((num >> 16) - amt, 0);
            const G = Math.max((num >> 8 & 0x00FF) - amt, 0);
            const B = Math.max((num & 0x0000FF) - amt, 0);
            return `rgb(${R}, ${G}, ${B})`;
        }

        function getCurrentSector(angle) {
            const pointerAngle = (3 * Math.PI / 2 - angle) % (2 * Math.PI);
            const normalizedAngle = pointerAngle < 0 ? pointerAngle + 2 * Math.PI : pointerAngle;
            return Math.floor(normalizedAngle / sectorAngle) % sectors.length;
        }

        function playTickSound() {
            tickSound.currentTime = 0;
            tickSound.play().catch(() => {});
        }

        function updateCenterText(text, isWin) {
            centerCircle.textContent = text;
            if (isWin) {
                centerCircle.classList.add('win');
            } else {
                centerCircle.classList.remove('win');
            }
        }

        function startSpin() {
            if (spinning || !gameInitialized) return;

            if (balance < SPIN_COST) {
                const need = SPIN_COST - balance;
                updateCenterText('Нужно\n' + need + ' G', false);
                spinButton.classList.add('shake');
                setTimeout(() => {
                    spinButton.classList.remove('shake');
                    updateCenterText('Крутить', false);
                }, 1500);
                return;
            }
            
            if (autoRetryTimeout) {
                clearTimeout(autoRetryTimeout);
                autoRetryTimeout = null;
            }

            balance -= SPIN_COST;
            updateBalanceDisplay();
            saveBalance();
            incrementSpinCount();

            spinning = true;
            spinButton.disabled = true;
            updateCenterText('...', false);
            lastSectorIndex = -1;
            
            const targetSector = getWeightedRandomSector();
            const targetMiddle = targetSector * sectorAngle + sectorAngle / 2;
            const pointerAngle = (3 * Math.PI / 2 - currentAngle) % (2 * Math.PI);
            const normPointer = pointerAngle < 0 ? pointerAngle + 2 * Math.PI : pointerAngle;
            
            let angleDiff = targetMiddle - normPointer;
            if (angleDiff < 0) angleDiff += 2 * Math.PI;
            
            const rotations = 5 + Math.floor(Math.random() * 4);
            const totalRotation = rotations * 2 * Math.PI + angleDiff;
            
            const startAngle = currentAngle;
            const duration = 3500;
            const startTime = performance.now();
            
            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                const easeOut = 1 - Math.pow(1 - progress, 4);
                
                currentAngle = startAngle + totalRotation * easeOut;
                drawWheel(currentAngle);

                const currentSector = getCurrentSector(currentAngle);
                if (currentSector !== lastSectorIndex && lastSectorIndex !== -1) {
                    playTickSound();
                }
                lastSectorIndex = currentSector;
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    currentAngle = currentAngle % (2 * Math.PI);
                    drawWheel(currentAngle);
                    
                    const sectorIndex = getCurrentSector(currentAngle);
                    const reward = sectors[sectorIndex].reward;
                    const goldEarned = sectors[sectorIndex].gold;
                    
                    updateCenterText(reward, true);
                    
                    if (goldEarned > 0) {
                        balance += goldEarned;
                        updateBalanceDisplay();
                        saveBalance();
                    }
                    
                    spinning = false;
                    spinButton.disabled = false;
                    
                    // Через 2 сек возвращаем "Крутить"
                    setTimeout(() => {
                        if (!spinning) updateCenterText('Крутить', false);
                    }, 2000);
                }
            }
            
            requestAnimationFrame(animate);
        }

        function initGame() {
            if (gameInitialized) return;
            
            spinButton = document.getElementById('spinButton');
            
            spinButton.addEventListener('click', startSpin);
            
            let touchStartY = 0;
            canvas.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
            });

            canvas.addEventListener('touchend', (e) => {
                const touchEndY = e.changedTouches[0].clientY;
                const swipeDistance = touchStartY - touchEndY;
                
                if (swipeDistance > 50 && !spinning) {
                    startSpin();
                }
            });
            
            drawWheel(currentAngle);
            updateCenterText('Крутить', false);
            
            gameInitialized = true;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
