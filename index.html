<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Колесо Фортуны | SO2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        /* Верхняя панель с профилем */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            display: none;
            justify-content: flex-end;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 25px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid #ffd700;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }

        .user-name {
            color: #ffd700;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Экран загрузки */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-container {
            text-align: center;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 215, 0, 0.2);
            border-top: 4px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #ffd700;
            font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* Основной контейнер игры */
        .game-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 400px;
            width: 100%;
            margin-top: 60px;
        }

        h1 {
            color: #ffd700;
            font-size: 2rem;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            text-align: center;
            letter-spacing: 2px;
        }

        .wheel-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
        }

        canvas {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.3));
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 45px solid #ff3333;
            filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.8));
        }

        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #ffd700, #b8860b);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
            z-index: 5;
        }

        .spin-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 140, 0, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            width: 100%;
            max-width: 250px;
        }

        .spin-btn:active {
            transform: scale(0.95);
        }

        .spin-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 20px;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
            width: 100%;
            max-width: 300px;
        }

        .result span {
            color: #ffd700;
            font-weight: bold;
        }

        @media (max-width: 380px) {
            .wheel-wrapper {
                width: 260px;
                height: 260px;
            }
            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <!-- Экран загрузки -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-container">
            <div class="loading-spinner"></div>
            <div class="loading-text">Загрузка...</div>
        </div>
    </div>

    <!-- Верхняя панель с профилем -->
    <div class="top-bar" id="topBar">
        <div class="user-profile">
            <div class="user-avatar" id="userAvatar">👤</div>
            <div class="user-name" id="userName">Игрок</div>
        </div>
    </div>

    <!-- Основная игра -->
    <div class="game-container" id="gameContainer">
        <h1>🎰 Колесо Фортуны</h1>
        
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <div class="center-circle"></div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>

        <button class="spin-btn" id="spinButton">Крутить</button>
        
        <div class="result" id="resultDisplay">
            Нажми <span>"Крутить"</span>
        </div>
    </div>

    <script>
        // ============ Telegram Mini App Integration ============
        const webApp = window.Telegram?.WebApp;
        let currentUser = null;

        function initTelegramApp() {
            if (!webApp) {
                showError('Откройте приложение через Telegram бота @SO2ruletka_bot');
                return false;
            }

            try {
                // Сообщаем Telegram что приложение готово
                webApp.ready();
                webApp.expand();
                
                // Получаем данные пользователя
                const initData = webApp.initDataUnsafe;
                
                if (initData && initData.user) {
                    currentUser = {
                        id: initData.user.id,
                        firstName: initData.user.first_name,
                        lastName: initData.user.last_name || '',
                        username: initData.user.username || '',
                        photoUrl: initData.user.photo_url || ''
                    };
                    
                    // Показываем интерфейс
                    showGameInterface();
                } else {
                    // Пробуем получить данные альтернативным способом
                    setTimeout(() => {
                        if (webApp.initDataUnsafe && webApp.initDataUnsafe.user) {
                            currentUser = {
                                id: webApp.initDataUnsafe.user.id,
                                firstName: webApp.initDataUnsafe.user.first_name,
                                lastName: webApp.initDataUnsafe.user.last_name || '',
                                username: webApp.initDataUnsafe.user.username || '',
                                photoUrl: webApp.initDataUnsafe.user.photo_url || ''
                            };
                            showGameInterface();
                        } else {
                            showError('Не удалось получить данные пользователя');
                        }
                    }, 1000);
                }
                
                return true;
            } catch (error) {
                console.error('Telegram init error:', error);
                showError('Ошибка инициализации');
                return false;
            }
        }

        function showGameInterface() {
            // Скрываем экран загрузки
            document.getElementById('loadingScreen').classList.add('hidden');
            
            // Показываем верхнюю панель
            const topBar = document.getElementById('topBar');
            topBar.style.display = 'flex';
            
            // Отображаем данные пользователя
            if (currentUser) {
                const userName = document.getElementById('userName');
                const userAvatar = document.getElementById('userAvatar');
                
                userName.textContent = currentUser.firstName + 
                    (currentUser.lastName ? ' ' + currentUser.lastName : '');
                
                if (currentUser.photoUrl) {
                    userAvatar.innerHTML = `<img src="${currentUser.photoUrl}" 
                        style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">`;
                } else {
                    userAvatar.textContent = currentUser.firstName.charAt(0).toUpperCase();
                }
            }
            
            // Показываем игру
            document.getElementById('gameContainer').style.display = 'flex';
            
            // Инициализируем колесо
            initGame();
        }

        function showError(message) {
            document.getElementById('loadingScreen').querySelector('.loading-text').textContent = message;
            document.getElementById('loadingScreen').querySelector('.loading-spinner').style.display = 'none';
        }

        // ============ Игра Колесо Фортуны ============
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        let spinButton;
        let resultDisplay;
        let gameInitialized = false;

        const sectors = [
            { label: 'НИЧЕГО', color: '#e74c3c', reward: 'Ничего 😔' },
            { label: 'ЕЩЁ РАЗ', color: '#3498db', reward: 'Ещё раз прокрутка 🔄' },
            { label: '10 ГОЛДЫ', color: '#2ecc71', reward: '10 голды 💰' },
            { label: 'НИЧЕГО', color: '#95a5a6', reward: 'Ничего 😔' },
            { label: '3 КЕЙСА', color: '#9b59b6', reward: '3 рандом кейса (Rare) 📦' },
            { label: '25 ГОЛДЫ', color: '#f39c12', reward: '25 голды 💰' }
        ];

        const sectorAngle = (2 * Math.PI) / sectors.length;
        let currentAngle = 0;
        let spinning = false;
        let autoRetryTimeout = null;

        function drawWheel(angle) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 180;

            sectors.forEach((sector, index) => {
                const startAngle = angle + index * sectorAngle;
                const endAngle = startAngle + sectorAngle;

                const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
                gradient.addColorStop(0, sector.color);
                gradient.addColorStop(1, darkenColor(sector.color, 30));

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + sectorAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px "Segoe UI", Tahoma, sans-serif';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                ctx.shadowBlur = 4;
                ctx.fillText(sector.label, radius - 25, 6);
                ctx.shadowBlur = 0;
                ctx.restore();
            });

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 4;
            ctx.shadowColor = 'rgba(255, 215, 0, 0.5)';
            ctx.shadowBlur = 15;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function darkenColor(hex, percent) {
            const num = parseInt(hex.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.max((num >> 16) - amt, 0);
            const G = Math.max((num >> 8 & 0x00FF) - amt, 0);
            const B = Math.max((num & 0x0000FF) - amt, 0);
            return `rgb(${R}, ${G}, ${B})`;
        }

        function getCurrentSector(angle) {
            const pointerAngle = (3 * Math.PI / 2 - angle) % (2 * Math.PI);
            const normalizedAngle = pointerAngle < 0 ? pointerAngle + 2 * Math.PI : pointerAngle;
            return Math.floor(normalizedAngle / sectorAngle) % sectors.length;
        }

        function startSpin() {
            if (spinning || !gameInitialized) return;
            
            if (autoRetryTimeout) {
                clearTimeout(autoRetryTimeout);
                autoRetryTimeout = null;
            }

            spinning = true;
            spinButton.disabled = true;
            resultDisplay.innerHTML = 'Крутится... 🎰';
            
            const rotations = 5 + Math.floor(Math.random() * 4);
            const totalRotation = rotations * 2 * Math.PI + (Math.random() * 2 * Math.PI);
            
            const startAngle = currentAngle;
            const duration = 3000;
            const startTime = performance.now();
            
            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                const easeOut = 1 - Math.pow(1 - progress, 3);
                
                currentAngle = startAngle + totalRotation * easeOut;
                drawWheel(currentAngle);
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    currentAngle = currentAngle % (2 * Math.PI);
                    drawWheel(currentAngle);
                    
                    const sectorIndex = getCurrentSector(currentAngle);
                    const result = sectors[sectorIndex].reward;
                    resultDisplay.innerHTML = `Результат: <span>${result}</span>`;
                    
                    spinning = false;
                    spinButton.disabled = false;
                    
                    if (result.includes('Ещё раз прокрутка')) {
                        autoRetryTimeout = setTimeout(() => {
                            if (!spinning) startSpin();
                        }, 1500);
                    }
                }
            }
            
            requestAnimationFrame(animate);
        }

        function initGame() {
            if (gameInitialized) return;
            
            spinButton = document.getElementById('spinButton');
            resultDisplay = document.getElementById('resultDisplay');
            
            spinButton.addEventListener('click', startSpin);
            
            let touchStartY = 0;
            canvas.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
            });

            canvas.addEventListener('touchend', (e) => {
                const touchEndY = e.changedTouches[0].clientY;
                const swipeDistance = touchStartY - touchEndY;
                
                if (swipeDistance > 50 && !spinning) {
                    startSpin();
                }
            });
            
            drawWheel(currentAngle);
            resultDisplay.innerHTML = 'Нажми <span>"Крутить"</span> для старта';
            
            gameInitialized = true;
        }

        // ============ Запуск ============
        document.addEventListener('DOMContentLoaded', initTelegramApp);
    </script>
</body>
</html>
